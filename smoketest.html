<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerta - Очередь раннего доступа</title>
    <!-- Google Fonts: Inter & Playfair Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --a-bg: #000000;
            --a-bg-elevated: #0a0a0a;
            --a-surface: rgba(25, 25, 25, 0.6);
            --a-border: rgba(255, 255, 255, 0.08);
            --a-border-strong: rgba(255, 255, 255, 0.15);
            --a-accent: #ffffff;
            --a-text: #ededed;
            --a-text-secondary: #a0a0a0;
            --a-text-muted: #888888;
            --a-font: 'Inter', system-ui, sans-serif;
            --a-font-serif: 'Playfair Display', serif;
            --a-radius-sm: 4px;
            --a-radius-lg: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--a-font);
        }

        body {
            background-color: var(--a-bg);
            color: var(--a-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle Background Gradient for Depth */
        body::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 700px;
            width: 100%;
            padding: 2rem;
            text-align: center;
            z-index: 1;
        }

        /* Logo Area */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2rem;
        }

        .logo-text {
            font-family: var(--a-font-serif);
            font-size: 4rem;
            font-weight: 500;
            letter-spacing: -0.03em;
            color: #ffffff;
        }

        /* Typography */
        h1 {
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--a-text-secondary);
            line-height: 1.6;
            margin-bottom: 3.5rem;
            padding: 0 1rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Form Area */
        .waitlist-form {
            display: flex;
            gap: 1rem;
            justify-content: center;
            max-width: 500px;
            margin: 0 auto;
        }

        .email-input {
            flex: 1;
            padding: 0.875rem 1.25rem;
            border-radius: var(--a-radius-sm);
            border: 1px solid var(--a-border);
            background-color: var(--a-bg-elevated);
            color: var(--a-text);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .email-input::placeholder {
            color: var(--a-text-muted);
        }

        .email-input:focus {
            border-color: var(--a-accent);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
        }

        .submit-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.875rem 1.75rem;
            border-radius: var(--a-radius-sm);
            border: none;
            background-color: var(--a-accent);
            color: #000000;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .submit-btn:hover {
            background-color: #e5e5e5;
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        .submit-btn.loading {
            pointer-events: none;
            opacity: 0.9;
        }

        .submit-btn.loading .fa-rocket {
            display: none;
        }

        .submit-btn.loading::before {
            content: "\f110"; /* fa-spinner */
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            animation: spin 1s linear infinite;
        }

        .submit-btn.success {
            background-color: #22c55e;
            color: #ffffff;
            pointer-events: none;
        }

        .submit-btn.success .fa-rocket {
            display: none;
        }

        .submit-btn.success::before {
            content: "\f00c"; /* fa-check */
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Success Message Overlay */
        .success-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 100;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .success-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .success-modal {
            background: var(--a-bg-elevated);
            border: 1px solid var(--a-border-strong);
            padding: 3rem 2rem;
            border-radius: var(--a-radius-lg);
            text-align: center;
            transform: scale(0.95) translateY(10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 420px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .success-overlay.show .success-modal {
            transform: scale(1) translateY(0);
        }

        .success-modal i {
            font-size: 3.5rem;
            color: #22c55e;
            margin-bottom: 1.5rem;
            animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.2s;
            opacity: 0;
            transform: scale(0.5);
        }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .success-modal h2 {
            font-size: 1.75rem;
            color: var(--a-accent);
            margin-bottom: 1rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .success-modal p {
            color: var(--a-text-secondary);
            line-height: 1.6;
            font-size: 1.05rem;
        }

        /* Footer */
        .footer {
            margin-top: 5rem;
            border-top: 1px solid var(--a-border);
            padding-top: 1.5rem;
            width: 100%;
            color: var(--a-text-muted);
            font-size: 0.8rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .logo-text {
                font-size: 3rem;
            }

            .waitlist-form {
                flex-direction: column;
            }

            .submit-btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo-container">
            <div class="logo-text">Alerta</div>
        </div>

        <h1>
            Следите за доступностью, предотвращайте сбои и побеждайте в надежности своих серверов и API. Присоединяйтесь
            к закрытому тестированию.
        </h1>

        <form class="waitlist-form" id="waitlistForm">
            <input type="email" class="email-input" placeholder="you@example.com" required>
            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fa-solid fa-rocket"></i> <span>Присоединиться</span>
            </button>
        </form>

        <div class="success-overlay" id="successOverlay">
            <div class="success-modal">
                <i class="fa-solid fa-circle-check"></i>
                <h2>Вы в списке!</h2>
                <p>Мы уведомим вас, как только Alerta будет готова к использованию.</p>
            </div>
        </div>

        <div class="footer">
            &copy; 2026 Alerta. Все права защищены.
        </div>
    </div>

    <script>
        const form = document.getElementById('waitlistForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = submitBtn.querySelector('span');
        const successOverlay = document.getElementById('successOverlay');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Loading state
            submitBtn.classList.add('loading');
            btnText.textContent = 'Обработка...';
            
            // Simulate API request delay
            setTimeout(() => {
                // Success state
                submitBtn.classList.remove('loading');
                submitBtn.classList.add('success');
                btnText.textContent = 'Успешно';
                
                // Show modal
                setTimeout(() => {
                    successOverlay.classList.add('show');
                    
                    // Auto-close modal and reset form
                    setTimeout(() => {
                        successOverlay.classList.remove('show');
                        
                        setTimeout(() => {
                            submitBtn.classList.remove('success');
                            btnText.textContent = 'Присоединиться';
                            form.reset();
                        }, 400); // Wait for modal fade out
                        
                    }, 3500);
                }, 400);
                
            }, 1200);
        });

        // Allow closing modal manually
        successOverlay.addEventListener('click', (e) => {
            if (e.target === successOverlay) {
                successOverlay.classList.remove('show');
                setTimeout(() => {
                    submitBtn.classList.remove('success');
                    btnText.textContent = 'Присоединиться';
                    form.reset();
                }, 400);
            }
        });
    </script>
</body>

</html>
